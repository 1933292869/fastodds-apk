name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool libtool-bin autoconf-archive pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: pip install buildozer Cython

      - name: Build APK
        run: |
          export ACLOCAL_PATH="$HOME/aclocal:/usr/share/aclocal"
          mkdir -p "$HOME/aclocal"
          cat > "$HOME/aclocal/libtool-fix.m4" << 'EOF'
AC_DEFUN([LT_SYS_SYMBOL_USCORE], [])
EOF
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fastodds-apk
          path: bin/*.apk
